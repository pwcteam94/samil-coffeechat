<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼일 커피챗 · 인사팀 대시보드</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
:root{
  --brand:#EE5836; --brand-deep:#CF4322; --brand-soft:#FDEEE8;
  --courage:#F2A93B; --go:#1FA266; --go-soft:#E4F5EC; --courage-soft:#FFF1DB;
  --ink:#23211F; --ink-soft:#5A554F; --ink-faint:#8A857E;
  --bg:#FBF6F0; --surface:#fff; --surface-2:#F7F1EA; --line:#EEE5DA; --line-soft:#F3ECE3;
  --r:18px; --shadow:0 10px 30px rgba(80,55,35,.08);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Pretendard,'Noto Sans KR',sans-serif}
button{cursor:pointer;border:none;font-family:inherit}
body{background:var(--bg);color:var(--ink);min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:26px 28px 60px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.top .brand{display:flex;align-items:center;gap:12px}
.bmk{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#5C6BC0,#7E8DE0);display:grid;place-items:center}
.bmk svg{width:22px;height:22px}
.brand h1{font-size:19px;font-weight:800}
.brand .s{font-size:12px;color:var(--ink-soft);font-weight:600}
.top .right{display:flex;align-items:center;gap:12px}
.pwc{font-family:Arial,sans-serif;font-weight:800;font-size:26px;color:#2D2A28}
.btn{height:40px;padding:0 16px;border-radius:11px;font-weight:700;font-size:13px}
.btn-ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink-soft)}
.btn-brand{background:var(--brand);color:#fff}
.btn-brand:hover{background:var(--brand-deep)}

.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.kpi .v{font-size:26px;font-weight:800;line-height:1}
.kpi .l{font-size:11.5px;color:var(--ink-soft);font-weight:700;margin-top:8px}
.kpi .d{font-size:10.5px;color:var(--ink-faint);font-weight:600;margin-top:3px}

.grid{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.card-h{padding:15px 18px;border-bottom:1px solid var(--line-soft);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:space-between}
.card-h .pill{font-size:11px;font-weight:700;color:var(--ink-faint)}
.seg{display:flex;gap:6px}
.seg button{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;background:var(--surface-2);color:var(--ink-soft)}
.seg button.on{background:var(--brand);color:#fff}

table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:11px 18px;font-size:12.5px;border-bottom:1px solid var(--line-soft)}
th{font-size:11px;color:var(--ink-faint);font-weight:700;background:var(--surface-2)}
tr:last-child td{border-bottom:none}
.who{display:flex;align-items:center;gap:9px}
.av{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px;flex:none}
.who .nm{font-weight:800;font-size:12.5px}
.who .sb{font-size:10.5px;color:var(--ink-faint);font-weight:600}
.st{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:14px;white-space:nowrap}
.st.pending{background:var(--courage-soft);color:#B07A1C}
.st.accepted{background:var(--go-soft);color:#15784A}
.st.declined{background:var(--line-soft);color:var(--ink-soft)}
.act{display:flex;gap:6px}
.act button{font-size:11px;font-weight:800;padding:5px 10px;border-radius:9px}
.acc{background:var(--go-soft);color:#15784A}
.dec{background:var(--surface-2);color:var(--ink-soft)}

.bar{display:flex;align-items:center;gap:10px;padding:9px 18px}
.bar .nm{width:120px;font-size:12px;font-weight:700;flex:none}
.bar .track{flex:1;height:9px;border-radius:6px;background:var(--surface-2);overflow:hidden}
.bar .fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--courage))}
.bar .n{width:60px;text-align:right;font-size:11.5px;font-weight:800;color:var(--ink-soft)}

.lb-row{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--line-soft)}
.lb-row .rk{width:20px;font-weight:800;color:var(--ink-faint);font-size:12px}
.lb-row .pt{margin-left:auto;font-weight:800;color:var(--brand-deep)}

.mail{padding:11px 18px;border-bottom:1px solid var(--line-soft)}
.mail .mh{display:flex;justify-content:space-between;font-size:12px}
.mail .mt{font-weight:800}
.mail .mto{font-size:11px;color:var(--ink-faint);font-weight:600}
.mail .tag{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:10px;background:var(--surface-2);color:var(--ink-soft)}

textarea,input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff}
textarea:focus,input:focus{outline:none;border-color:var(--brand)}
.field{padding:0 18px 14px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-soft);margin:12px 0 6px}

/* gate */
.gate{position:fixed;inset:0;background:linear-gradient(135deg,#EEF0FB,#E7EAF6);display:grid;place-items:center;z-index:100;padding:20px}
.gate-card{width:min(400px,94vw);background:#fff;border-radius:22px;box-shadow:0 30px 80px rgba(60,55,90,.22);padding:30px}
.gate-card h2{font-size:18px;font-weight:800;margin-bottom:6px}
.gate-card p{font-size:12.5px;color:var(--ink-soft);margin-bottom:18px}
.gate-err{color:#D8472E;font-size:12px;font-weight:700;margin-top:10px;min-height:14px}
body.ok .gate{display:none}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;transition:.25s;z-index:120}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="bmk"><svg viewBox="0 0 24 24" fill="none"><path d="M4 19V8l8-4 8 4v11M4 19h16M9 19v-5h6v5" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div><h1>삼일 커피챗 · 인사팀 대시보드</h1><div class="s">신규 입사자 네트워킹 챌린지 운영 현황</div></div>
    </div>
    <div class="right">
      <button class="btn btn-ghost" onclick="load()">↻ 새로고침</button>
      <a class="btn btn-ghost" href="/" style="display:grid;place-items:center;text-decoration:none">사용자 앱 →</a>
      <span class="pwc">pwc</span>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div>
      <div class="card">
        <div class="card-h">신청 현황 (전체)
          <div class="seg" id="seg">
            <button data-f="all" class="on">전체</button>
            <button data-f="pending">대기</button>
            <button data-f="accepted">수락</button>
            <button data-f="declined">거절</button>
          </div>
        </div>
        <div style="max-height:460px;overflow:auto"><table>
          <thead><tr><th>신규 입사자</th><th>선배 (멘토)</th><th>상태</th><th>신청 시각</th><th>처리</th></tr></thead>
          <tbody id="reqBody"></tbody>
        </table></div>
      </div>
      <div class="card">
        <div class="card-h">본부별 신청 분포</div>
        <div id="byDept" style="padding:8px 0"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-h">📢 전체 공지 발송 <span class="pill">이메일 + 인앱 알림</span></div>
        <div class="field">
          <label>제목</label><input id="anSub" placeholder="예) 삼일인의 밤 안내">
          <label>내용</label><textarea id="anBody" rows="3" placeholder="모든 신규 입사자에게 발송됩니다."></textarea>
          <button class="btn btn-brand" style="width:100%;margin-top:12px" onclick="announce()">전체 발송</button>
        </div>
      </div>
      <div class="card">
        <div class="card-h">용기 점수 리더보드</div>
        <div id="lb"></div>
      </div>
      <div class="card">
        <div class="card-h">최근 발송 메일 (Outbox)</div>
        <div id="mails" style="max-height:280px;overflow:auto"></div>
      </div>
    </div>
  </div>
</div>

<!-- admin gate -->
<div class="gate" id="gate">
  <div class="gate-card">
    <h2>인사팀 대시보드</h2>
    <p>운영자 접근 키를 입력하세요. (데모 기본값: <b>samil-hr</b>)</p>
    <input id="keyIn" type="password" placeholder="Admin key" onkeydown="if(event.key==='Enter')unlock()">
    <button class="btn btn-brand" style="width:100%;margin-top:12px" onclick="unlock()">입장</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="admin.js"></script>
</body>
</html>
